<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Registro de Asistencia — POWERX</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #F0F4F8; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }
    .card { background: #fff; border-radius: 20px; padding: 1.75rem 1.5rem; max-width: 380px; width: 100%; box-shadow: 0 4px 24px rgba(0,0,0,0.09); }
    .header { text-align: center; margin-bottom: 1.25rem; }
    .logo { width: 52px; height: 52px; border-radius: 14px; background: #1D4ED8; display: flex; align-items: center; justify-content: center; margin: 0 auto 10px; }
    .logo svg { width: 28px; height: 28px; }
    h1 { font-size: 18px; font-weight: 600; color: #111827; }
    .date-text { font-size: 12px; color: #6B7280; margin-top: 3px; }
    .sat-badge { display: inline-block; margin-top: 5px; background: #FEF3C7; color: #92400E; font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 999px; }
    .clock { text-align: center; font-size: 36px; font-weight: 300; color: #111827; letter-spacing: 2px; margin-bottom: 1.25rem; }
    .label { font-size: 11px; font-weight: 600; color: #9CA3AF; text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 8px; }
    .names-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 1.25rem; }
    .name-btn { padding: 13px 4px; border-radius: 12px; border: 1.5px solid #E5E7EB; background: #fff; cursor: pointer; font-size: 13px; color: #374151; text-align: center; font-family: inherit; transition: all 0.15s; }
    .name-btn:active { transform: scale(0.96); }
    .name-btn.selected { background: #EFF6FF; border-color: #3B82F6; color: #1D4ED8; font-weight: 600; }
    .fp-dot { font-size: 10px; display: block; margin-top: 3px; color: #22C55E; }
    .fp-dot.none { color: #D1D5DB; }
    .steps-row { display: flex; align-items: center; justify-content: center; gap: 6px; margin-bottom: 6px; }
    .step-bubble { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; border: 2px solid #E5E7EB; color: #9CA3AF; background: #fff; transition: all 0.2s; flex-shrink: 0; }
    .step-bubble.active { border-color: #3B82F6; color: #1D4ED8; background: #EFF6FF; }
    .step-bubble.done { border-color: #16A34A; color: #fff; background: #16A34A; }
    .step-line { flex: 1; height: 2px; background: #E5E7EB; max-width: 40px; transition: background 0.2s; }
    .step-line.done { background: #16A34A; }
    .step-label-row { display: flex; justify-content: space-between; margin-bottom: 1rem; }
    .step-lbl { font-size: 10px; color: #9CA3AF; text-align: center; flex: 1; }
    .step-lbl.active { color: #1D4ED8; font-weight: 600; }
    .step-lbl.done { color: #16A34A; }
    .pin-section { margin-bottom: 1rem; }
    .pin-display { text-align: center; font-size: 28px; letter-spacing: 12px; color: #111827; margin-bottom: 10px; min-height: 40px; }
    .pin-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; max-width: 220px; margin: 0 auto; }
    .pin-key { padding: 14px 4px; border-radius: 10px; border: 1.5px solid #E5E7EB; background: #fff; font-size: 18px; font-weight: 500; color: #111827; cursor: pointer; text-align: center; font-family: inherit; transition: all 0.1s; }
    .pin-key:active { background: #EFF6FF; border-color: #3B82F6; transform: scale(0.95); }
    .pin-key.del { font-size: 16px; color: #6B7280; }
    .fp-section { text-align: center; margin-bottom: 1rem; }
    .fp-btn { width: 86px; height: 86px; border-radius: 50%; border: 2.5px solid #E5E7EB; background: #F9FAFB; cursor: not-allowed; display: inline-flex; align-items: center; justify-content: center; margin-bottom: 8px; transition: all 0.15s; opacity: 0.4; }
    .fp-btn.ready { border-color: #3B82F6; background: #EFF6FF; cursor: pointer; opacity: 1; }
    .fp-btn.ready:active { transform: scale(0.93); background: #DBEAFE; }
    .fp-btn.verified { border-color: #16A34A; background: #F0FDF4; cursor: default; opacity: 1; }
    .fp-btn svg { width: 42px; height: 42px; }
    .fp-hint { font-size: 13px; color: #6B7280; }
    .action-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 1.25rem; }
    .btn { padding: 14px; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit; border: none; transition: all 0.15s; }
    .btn:active { transform: scale(0.97); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
    .btn-e { background: #16A34A; color: #fff; }
    .btn-s { background: #F3F4F6; color: #374151; border: 1.5px solid #E5E7EB; }
    .msg { padding: 12px 14px; border-radius: 10px; font-size: 14px; text-align: center; display: none; line-height: 1.5; margin-top: 1rem; }
    .msg.ok   { background: #F0FDF4; color: #15803D; border: 1px solid #BBF7D0; }
    .msg.err  { background: #FEF2F2; color: #B91C1C; border: 1px solid #FECACA; }
    .msg.info { background: #EFF6FF; color: #1D4ED8; border: 1px solid #BFDBFE; }
    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid currentColor; border-top-color: transparent; border-radius: 50%; animation: spin 0.6s linear infinite; vertical-align: middle; margin-right: 5px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="card">
  <div class="header">
    <div class="logo">
      <svg viewBox="0 0 28 28" fill="none">
        <circle cx="14" cy="9" r="4.5" stroke="white" stroke-width="2"/>
        <path d="M5 24c0-5 4-8.5 9-8.5s9 3.5 9 8.5" stroke="white" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </div>
    <h1>Registro de Asistencia</h1>
    <p class="date-text" id="date-text"></p>
    <div id="sat-badge" class="sat-badge" style="display:none">Sábado · Turno 9:00–14:00</div>
  </div>

  <div class="clock" id="clock">--:--</div>

  <div id="form-area">
    <div class="label">¿Quién eres?</div>
    <div class="names-grid" id="names-grid">
      <div style="grid-column:1/-1;text-align:center;color:#9CA3AF;font-size:13px;padding:1rem">Cargando...</div>
    </div>

    <div class="steps-row">
      <div class="step-bubble" id="sb1">1</div>
      <div class="step-line" id="sl1"></div>
      <div class="step-bubble" id="sb2">2</div>
      <div class="step-line" id="sl2"></div>
      <div class="step-bubble" id="sb3">3</div>
    </div>
    <div class="step-label-row">
      <span class="step-lbl" id="sl-lbl1">PIN</span>
      <span class="step-lbl" id="sl-lbl2">Huella</span>
      <span class="step-lbl" id="sl-lbl3">Registrar</span>
    </div>

    <div class="pin-section">
      <div class="label" style="text-align:center">Ingresa tu PIN</div>
      <div class="pin-display" id="pin-display">····</div>
      <div class="pin-grid" id="pin-grid"></div>
    </div>

    <div class="fp-section">
      <button class="fp-btn" id="fp-btn" onclick="doFingerprint()">
        <svg viewBox="0 0 42 42" fill="none">
          <path d="M21 5C11.6 5 4 12.6 4 22" stroke="#9CA3AF" stroke-width="2.2" stroke-linecap="round" id="fp-p1"/>
          <path d="M38 22c0 8.8-7.2 16-16 16" stroke="#9CA3AF" stroke-width="2.2" stroke-linecap="round" id="fp-p2"/>
          <path d="M13 22a8 8 0 0 1 8-8" stroke="#9CA3AF" stroke-width="2.2" stroke-linecap="round" id="fp-p3"/>
          <path d="M29 22a8 8 0 0 1-8 8" stroke="#9CA3AF" stroke-width="2.2" stroke-linecap="round" id="fp-p4"/>
          <circle cx="21" cy="22" r="3" fill="#9CA3AF" id="fp-c"/>
        </svg>
      </button>
      <p class="fp-hint" id="fp-hint">Ingresa tu PIN primero</p>
    </div>

    <div class="action-row">
      <button class="btn btn-e" id="btn-e" disabled onclick="submit('entrada')">Entrada</button>
      <button class="btn btn-s" id="btn-s" disabled onclick="submit('salida')">Salida</button>
    </div>
    <div class="msg" id="msg"></div>
  </div>
</div>

<script>
  const API_URL = 'https://script.google.com/macros/s/AKfycbz8O5y73x3b9o80gPo0Dd9bxp9GdLN2aGXZJ8H1XBeMaShRMOTWrJv4Lt_VqEv0GMs4YA/exec';

  var selName = null, selCred = null;
  var pinOk = false, pinVal = '';
  var fpOk = false;
  var authChallenge = null, authCredId = null;
  var employees = [];

  var today = new Date();
  document.getElementById('date-text').textContent = today.toLocaleDateString('es-MX',
    { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

  function updateClock() {
    document.getElementById('clock').textContent =
      new Date().toLocaleTimeString('es-MX', { hour: '2-digit', minute: '2-digit' });
  }
  updateClock(); setInterval(updateClock, 1000);

  function updateSteps() {
    var sb1 = document.getElementById('sb1'), sl1 = document.getElementById('sl1');
    var sb2 = document.getElementById('sb2'), sl2 = document.getElementById('sl2');
    var sb3 = document.getElementById('sb3');
    var lbl1 = document.getElementById('sl-lbl1');
    var lbl2 = document.getElementById('sl-lbl2');
    var lbl3 = document.getElementById('sl-lbl3');
    if (pinOk) {
      sb1.className = 'step-bubble done'; sb1.textContent = '✓';
      sl1.className = 'step-line done'; lbl1.className = 'step-lbl done';
    } else if (selName) {
      sb1.className = 'step-bubble active'; sb1.textContent = '1';
      sl1.className = 'step-line'; lbl1.className = 'step-lbl active';
    } else {
      sb1.className = 'step-bubble'; sb1.textContent = '1';
      sl1.className = 'step-line'; lbl1.className = 'step-lbl';
    }
    if (fpOk) {
      sb2.className = 'step-bubble done'; sb2.textContent = '✓';
      sl2.className = 'step-line done'; lbl2.className = 'step-lbl done';
    } else if (pinOk) {
      sb2.className = 'step-bubble active'; sb2.textContent = '2';
      sl2.className = 'step-line'; lbl2.className = 'step-lbl active';
    } else {
      sb2.className = 'step-bubble'; sb2.textContent = '2';
      sl2.className = 'step-line'; lbl2.className = 'step-lbl';
    }
    if (pinOk && fpOk) {
      sb3.className = 'step-bubble active'; sb3.textContent = '3'; lbl3.className = 'step-lbl active';
    } else {
      sb3.className = 'step-bubble'; sb3.textContent = '3'; lbl3.className = 'step-lbl';
    }
  }

  var pinKeys = [1,2,3,4,5,6,7,8,9,'',0,'⌫'];
  var pinGrid = document.getElementById('pin-grid');
  pinKeys.forEach(function(k) {
    var btn = document.createElement('button');
    btn.className = 'pin-key' + (k === '⌫' ? ' del' : '');
    btn.textContent = k === '' ? '' : k;
    btn.disabled = k === '';
    btn.style.visibility = k === '' ? 'hidden' : 'visible';
    btn.onclick = function() {
      if (!selName) { showMsg('info', 'Selecciona tu nombre primero.'); return; }
      if (k === '⌫') { pinVal = pinVal.slice(0,-1); pinOk = false; fpOk = false; authChallenge = null; authCredId = null; setFpState('disabled'); }
      else if (typeof k === 'number' && pinVal.length < 4) { pinVal += k; }
      updatePinDisplay();
      if (pinVal.length === 4) {
        pinOk = true;
        setFpState(selCred ? 'ready' : 'no-fp');
        showMsg('info', selCred ? 'PIN listo. Ahora verifica tu huella.' : 'PIN listo. Este colaborador no tiene huella registrada.');
      } else {
        pinOk = false; fpOk = false; setFpState('disabled');
      }
      disableActions(); updateSteps();
    };
    pinGrid.appendChild(btn);
  });

  function updatePinDisplay() {
    document.getElementById('pin-display').textContent = '●'.repeat(pinVal.length) + '·'.repeat(4 - pinVal.length);
  }

  function setFpState(state) {
    var btn  = document.getElementById('fp-btn');
    var hint = document.getElementById('fp-hint');
    if (state === 'disabled') {
      btn.className = 'fp-btn'; setFpColor('#9CA3AF');
      hint.textContent = selName ? 'Ingresa tu PIN primero' : 'Selecciona tu nombre primero';
    } else if (state === 'ready') {
      btn.className = 'fp-btn ready'; setFpColor('#3B82F6');
      hint.textContent = 'Toca para verificar tu huella';
    } else if (state === 'verified') {
      btn.className = 'fp-btn verified'; setFpColor('#16A34A');
      hint.textContent = '✓ Huella verificada';
    } else if (state === 'no-fp') {
      btn.className = 'fp-btn'; setFpColor('#9CA3AF');
      hint.textContent = 'Sin huella registrada — solo PIN';
    }
  }

  function setFpColor(c) {
    ['fp-p1','fp-p2','fp-p3','fp-p4'].forEach(function(id){ var el = document.getElementById(id); if(el) el.setAttribute('stroke', c); });
    var fc = document.getElementById('fp-c'); if(fc) fc.setAttribute('fill', c);
  }

  fetch(API_URL + '?action=employees')
    .then(function(r){ return r.json(); })
    .then(function(emps) {
      employees = emps;
      var grid = document.getElementById('names-grid');
      grid.innerHTML = '';
      if (emps.length && emps[0].isSaturday) document.getElementById('sat-badge').style.display = 'inline-block';
      emps.forEach(function(emp) {
        var btn = document.createElement('button');
        btn.className = 'name-btn';
        var dot = emp.hasFingerprint ? '<span class="fp-dot">● huella</span>' : '<span class="fp-dot none">○ solo PIN</span>';
        btn.innerHTML = emp.name + dot;
        btn.onclick = function() {
          document.querySelectorAll('.name-btn').forEach(function(b){ b.classList.remove('selected'); });
          btn.classList.add('selected');
          selName = emp.name; selCred = emp.credentialId;
          pinOk = false; fpOk = false; pinVal = ''; authChallenge = null; authCredId = null;
          updatePinDisplay(); disableActions(); setFpState('disabled'); updateSteps();
          document.getElementById('msg').style.display = 'none';
        };
        grid.appendChild(btn);
      });
      updateSteps();
    })
    .catch(function() {
      document.getElementById('names-grid').innerHTML =
        '<div style="grid-column:1/-1;text-align:center;color:#B91C1C;font-size:13px;padding:1rem">Error de conexión. Recarga la página.</div>';
    });

  function doFingerprint() {
    if (!pinOk || !selCred) return;
    var fpBtn = document.getElementById('fp-btn');
    fpBtn.className = 'fp-btn'; setFpColor('#9CA3AF');
    showMsg('info', '<span class="spinner"></span>Esperando huella...');
    fetch(API_URL + '?action=challenge')
      .then(function(r){ return r.json(); })
      .then(function(data) {
        var challenge    = data.challenge;
        var challengeBuf = new TextEncoder().encode(challenge);
        var credIdBuf    = _b64ToBuffer(selCred);
        return navigator.credentials.get({
          publicKey: { challenge: challengeBuf, allowCredentials: [{ type: 'public-key', id: credIdBuf }], userVerification: 'required', timeout: 60000 }
        }).then(function(assertion) {
          authChallenge = challenge;
          authCredId    = btoa(String.fromCharCode(...new Uint8Array(assertion.rawId)));
          fpOk = true;
          setFpState('verified');
          enableActions();
          showMsg('ok', '✓ PIN y huella verificados. Presiona Entrada o Salida.');
          updateSteps();
        });
      })
      .catch(function(err) {
        setFpState('ready');
        showMsg('err', err.name === 'NotAllowedError' ? 'Huella cancelada. Intenta de nuevo.' : 'Error: ' + err.message);
      });
  }

  function submit(type) {
    if (!selName || !pinOk || !fpOk) return;
    disableActions();
    showMsg('info', '<span class="spinner"></span>Registrando ' + type + '...');
    var payload = { name: selName, type: type, method: 'both', pin: pinVal, credentialId: authCredId, challenge: authChallenge };
    fetch(API_URL + '?action=attendance', {
      method: 'POST', headers: { 'Content-Type': 'text/plain' }, body: JSON.stringify(payload)
    })
    .then(function(r){ return r.json(); })
    .then(function(res) {
      showMsg(res.ok ? 'ok' : 'err', res.msg);
      if (res.ok) {
        setTimeout(function() {
          document.querySelectorAll('.name-btn').forEach(function(b){ b.classList.remove('selected'); });
          selName = null; selCred = null; pinOk = false; fpOk = false; pinVal = '';
          authChallenge = null; authCredId = null;
          updatePinDisplay(); disableActions(); setFpState('disabled'); updateSteps();
          document.getElementById('msg').style.display = 'none';
        }, 3500);
      } else { enableActions(); }
    })
    .catch(function() { showMsg('err', 'Error de conexión. Intenta de nuevo.'); enableActions(); });
  }

  function enableActions()  { document.getElementById('btn-e').disabled = false; document.getElementById('btn-s').disabled = false; }
  function disableActions() { document.getElementById('btn-e').disabled = true;  document.getElementById('btn-s').disabled = true;  }
  function showMsg(type, html) { var el = document.getElementById('msg'); el.innerHTML = html; el.className = 'msg ' + type; el.style.display = 'block'; }
  function _b64ToBuffer(b64) {
    var bin = atob(b64.replace(/-/g,'+').replace(/_/g,'/'));
    var buf = new Uint8Array(bin.length);
    for (var i = 0; i < bin.length; i++) buf[i] = bin.charCodeAt(i);
    return buf.buffer;
  }

  updateSteps();
</script>
</body>
</html>
