<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>POWERX · Asistencia</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --orange:      #FF6B00;
      --orange-dim:  #CC5500;
      --bg:          #080808;
      --surface:     #121212;
      --surface2:    #1C1C1C;
      --surface3:    #242424;
      --text:        #F0F0F0;
      --muted:       #666666;
      --muted2:      #444444;
      --success:     #00E676;
      --error:       #FF3D3D;
      --border:      #2A2A2A;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Barlow', sans-serif;
      overscroll-behavior: none;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 100dvh;
      padding: 0 0 env(safe-area-inset-bottom);
    }

    /* ── HEADER ── */
    .header {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 24px 0;
    }

    .logo {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.6rem;
      font-weight: 900;
      letter-spacing: 2px;
      color: var(--orange);
    }

    .clock {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 1px;
    }

    /* ── LOCATION STRIP ── */
    .location-strip {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 24px;
      border-bottom: 1px solid var(--border);
    }

    .loc-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
      transition: background 0.4s;
    }
    .loc-dot.checking { background: var(--orange); animation: blink 1s infinite; }
    .loc-dot.ok       { background: var(--success); }
    .loc-dot.bad      { background: var(--error); }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

    .loc-text {
      font-size: 0.78rem;
      color: var(--muted);
      letter-spacing: 0.3px;
    }

    /* ── MAIN CONTENT ── */
    .content {
      flex: 1;
      width: 100%;
      max-width: 400px;
      padding: 32px 24px 24px;
      display: flex;
      flex-direction: column;
    }

    /* ── STEP: PIN ── */
    #stepPin { display: flex; flex-direction: column; }

    .step-heading {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: 1px;
      margin-bottom: 4px;
      line-height: 1;
    }

    .step-sub {
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 32px;
    }

    /* PIN dots */
    .pin-row {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 40px;
    }

    .pin-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 2px solid var(--muted2);
      transition: all 0.15s ease;
    }
    .pin-dot.filled {
      background: var(--orange);
      border-color: var(--orange);
      transform: scale(1.2);
    }
    .pin-dot.error {
      background: var(--error);
      border-color: var(--error);
      animation: shake 0.4s ease;
    }

    @keyframes shake {
      0%,100%{transform:translateX(0)} 20%{transform:translateX(-6px)}
      40%{transform:translateX(6px)} 60%{transform:translateX(-4px)}
      80%{transform:translateX(4px)}
    }

    /* Keypad */
    .keypad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .key {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 0;
      height: 72px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--text);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.1s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      user-select: none;
    }

    .key:active {
      background: var(--orange);
      border-color: var(--orange);
      transform: scale(0.93);
    }

    .key.key-del {
      font-size: 1.3rem;
      color: var(--muted);
    }

    .key.key-empty { visibility: hidden; }

    .pin-msg {
      margin-top: 18px;
      text-align: center;
      font-size: 0.85rem;
      color: var(--error);
      min-height: 20px;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .pin-msg.show { opacity: 1; }

    /* ── STEP: WEBAUTHN ── */
    #stepWebAuthn {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      text-align: center;
      gap: 16px;
    }

    .avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--orange), var(--orange-dim));
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 2.2rem;
      font-weight: 900;
      color: white;
      margin-bottom: 4px;
    }

    .greet-name {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .webauthn-hint {
      font-size: 0.85rem;
      color: var(--muted);
      max-width: 240px;
      line-height: 1.5;
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--orange);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .webauthn-err {
      font-size: 0.85rem;
      color: var(--error);
      max-width: 260px;
    }

    /* ── STEP: ACCIÓN ── */
    #stepAction {
      display: none;
      flex-direction: column;
      flex: 1;
    }

    .action-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 32px;
    }

    .action-avatar {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--orange), var(--orange-dim));
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.5rem;
      font-weight: 900;
      color: white;
      flex-shrink: 0;
    }

    .action-name {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.7rem;
      font-weight: 700;
      line-height: 1;
    }

    .action-sub {
      font-size: 0.82rem;
      color: var(--muted);
      margin-top: 3px;
    }

    .action-divider {
      height: 1px;
      background: var(--border);
      margin-bottom: 28px;
    }

    .btn-action {
      width: 100%;
      padding: 20px;
      border-radius: 18px;
      border: none;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: 1px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      margin-bottom: 12px;
    }

    .btn-entrada {
      background: var(--orange);
      color: white;
    }
    .btn-entrada:active { background: var(--orange-dim); transform: scale(0.97); }

    .btn-salida {
      background: transparent;
      color: var(--orange);
      border: 2px solid var(--orange);
    }
    .btn-salida:active { background: rgba(255,107,0,.12); transform: scale(0.97); }

    .btn-action:disabled {
      opacity: 0.35;
      pointer-events: none;
    }

    .action-msg {
      margin-top: 12px;
      text-align: center;
      font-size: 0.85rem;
      min-height: 20px;
    }
    .action-msg.error   { color: var(--error); }
    .action-msg.loading { color: var(--muted); }

    /* ── STEP: ÉXITO ── */
    #stepSuccess {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      text-align: center;
      gap: 12px;
    }

    .success-badge {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.8rem;
      margin-bottom: 8px;
    }
    .success-badge.entrada { background: rgba(0,230,118,.12); }
    .success-badge.salida  { background: rgba(255,61,61,.12); }

    .success-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 2.2rem;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .success-detail {
      font-size: 0.9rem;
      color: var(--muted);
    }

    .success-time-big {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 3rem;
      font-weight: 900;
      color: var(--orange);
      letter-spacing: 2px;
      line-height: 1;
    }

    .btn-reset {
      margin-top: 24px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 28px;
      color: var(--muted);
      font-family: 'Barlow', sans-serif;
      font-size: 0.9rem;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-reset:active { background: var(--surface3); }

    /* ── UTILIDADES ── */
    .hidden { display: none !important; }
  </style>
</head>
<body>

  <div class="header">
    <div class="logo">POWERX</div>
    <div class="clock" id="clockDisplay">--:--</div>
  </div>

  <div class="location-strip">
    <div class="loc-dot checking" id="locDot"></div>
    <span class="loc-text" id="locText">Verificando ubicación…</span>
  </div>

  <div class="content">

    <!-- ────── PASO 1: PIN ────── -->
    <div id="stepPin">
      <div class="step-heading">INGRESA</div>
      <div class="step-heading" style="color:var(--orange)">TU PIN</div>
      <div class="step-sub">4 dígitos · Solo tú lo conoces</div>

      <div class="pin-row" id="pinRow">
        <div class="pin-dot" id="d0"></div>
        <div class="pin-dot" id="d1"></div>
        <div class="pin-dot" id="d2"></div>
        <div class="pin-dot" id="d3"></div>
      </div>

      <div class="keypad" id="keypad">
        <button class="key" data-k="1">1</button>
        <button class="key" data-k="2">2</button>
        <button class="key" data-k="3">3</button>
        <button class="key" data-k="4">4</button>
        <button class="key" data-k="5">5</button>
        <button class="key" data-k="6">6</button>
        <button class="key" data-k="7">7</button>
        <button class="key" data-k="8">8</button>
        <button class="key" data-k="9">9</button>
        <button class="key key-empty" disabled></button>
        <button class="key" data-k="0">0</button>
        <button class="key key-del" id="keyDel">⌫</button>
      </div>

      <div class="pin-msg" id="pinMsg"></div>
    </div>

    <!-- ────── PASO 2: WEBAUTHN ────── -->
    <div id="stepWebAuthn">
      <div class="avatar" id="waAvatar">?</div>
      <div class="greet-name" id="waName">Verificando…</div>
      <div class="webauthn-hint" id="waHint">
        Confirma tu identidad con la biometría de tu celular
      </div>
      <div class="spinner" id="waSpinner"></div>
      <div class="webauthn-err hidden" id="waErr"></div>
    </div>

    <!-- ────── PASO 3: ACCIÓN ────── -->
    <div id="stepAction">
      <div class="action-header">
        <div class="action-avatar" id="actAvatar">?</div>
        <div>
          <div class="action-name" id="actName">—</div>
          <div class="action-sub">¿Qué deseas registrar?</div>
        </div>
      </div>
      <div class="action-divider"></div>

      <button class="btn-action btn-entrada" id="btnEntrada">
        <span>⬤</span> ENTRADA
      </button>
      <button class="btn-action btn-salida" id="btnSalida">
        <span>◯</span> SALIDA
      </button>

      <div class="action-msg" id="actMsg"></div>
    </div>

    <!-- ────── PASO 4: ÉXITO ────── -->
    <div id="stepSuccess">
      <div class="success-badge" id="successBadge">
        <span id="successIcon">✓</span>
      </div>
      <div class="success-title" id="successTitle">REGISTRADO</div>
      <div class="success-detail" id="successDetail">—</div>
      <div class="success-time-big" id="successTimeBig">--:--</div>
      <button class="btn-reset" onclick="resetApp()">Nuevo registro</button>
    </div>

  </div><!-- /content -->

  <script>
  // ══════════════════════════════════════════════════════════
  //  ▶  CONFIGURACIÓN  —  REEMPLAZA LA URL
  // ══════════════════════════════════════════════════════════
  const GAS_URL      = 'https://script.google.com/macros/s/AKfycbyZWc4lQRxUTpy_q6tz8vuWr1pqdZxvw06psysk3Tb2u9fnyWYum7V1rPlp7sQlHSPIuA/exec';
  const STORE_LAT    = 21.501675;
  const STORE_LNG    = -104.902560;
  const MAX_DIST     = 100; // metros
  // ══════════════════════════════════════════════════════════

  // Estado
  let pin          = '';
  let locationOK   = false;
  let userLat      = null;
  let userLng      = null;
  let employee     = null;   // { id, name }
  let credentialId = null;   // base64 string
  let busy         = false;

  // ─── RELOJ ───────────────────────────────────────────────
  function tickClock() {
    const now = new Date();
    document.getElementById('clockDisplay').textContent =
      now.toLocaleTimeString('es-MX', { hour: '2-digit', minute: '2-digit' });
  }
  setInterval(tickClock, 1000);
  tickClock();

  // ─── GEOLOCALIZACIÓN ─────────────────────────────────────
  function initGeo() {
    if (!navigator.geolocation) {
      setGeo('bad', 'GPS no disponible en este dispositivo');
      return;
    }
    navigator.geolocation.getCurrentPosition(onGeoOK, onGeoErr,
      { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 });
  }

  function onGeoOK(pos) {
    userLat = pos.coords.latitude;
    userLng = pos.coords.longitude;
    const d = haversine(userLat, userLng, STORE_LAT, STORE_LNG);
    if (d <= MAX_DIST) {
      locationOK = true;
      setGeo('ok', `En tienda · ${Math.round(d)} m`);
    } else {
      locationOK = false;
      setGeo('bad', `Fuera de rango · ${Math.round(d)} m de la tienda`);
    }
  }

  function onGeoErr(e) {
    locationOK = false;
    setGeo('bad', e.code === 1
      ? 'Permiso de ubicación denegado'
      : 'No se pudo obtener tu ubicación');
  }

  function setGeo(state, txt) {
    const dot = document.getElementById('locDot');
    dot.className = 'loc-dot ' + (state === 'ok' ? 'ok' : state === 'bad' ? 'bad' : 'checking');
    document.getElementById('locText').textContent = txt;
  }

  // ─── TECLADO PIN ─────────────────────────────────────────
  document.querySelectorAll('.key[data-k]').forEach(btn => {
    btn.addEventListener('click', () => pressKey(btn.dataset.k));
  });
  document.getElementById('keyDel').addEventListener('click', delKey);

  function pressKey(digit) {
    if (busy || pin.length >= 4) return;
    pin += digit;
    renderPinDots();
    if (pin.length === 4) {
      busy = true;
      setTimeout(submitPin, 250);
    }
  }

  function delKey() {
    if (busy) return;
    pin = pin.slice(0, -1);
    renderPinDots();
    setPinMsg('');
  }

  function renderPinDots(state) {
    for (let i = 0; i < 4; i++) {
      const el = document.getElementById('d' + i);
      el.className = 'pin-dot' +
        (i < pin.length ? (state === 'error' ? ' error' : ' filled') : '');
    }
  }

  function setPinMsg(msg) {
    const el = document.getElementById('pinMsg');
    el.textContent = msg;
    el.classList.toggle('show', msg !== '');
  }

  async function submitPin() {
    // Verificar ubicación antes de todo
    if (!locationOK) {
      renderPinDots('error');
      setPinMsg('📍 Debes estar en la tienda para registrar asistencia');
      setTimeout(() => { pin = ''; renderPinDots(); busy = false; }, 1800);
      return;
    }

    try {
      const res  = await fetch(`${GAS_URL}?action=validate_pin&pin=${encodeURIComponent(pin)}`);
      const data = await res.json();

      if (!data.success) {
        renderPinDots('error');
        setPinMsg('PIN incorrecto — intenta de nuevo');
        setTimeout(() => { pin = ''; renderPinDots(); setPinMsg(''); busy = false; }, 1500);
        return;
      }

      if (!data.deviceRegistered) {
        renderPinDots('error');
        setPinMsg('⚠️ Dispositivo no registrado. Habla con el administrador.');
        setTimeout(() => { pin = ''; renderPinDots(); setPinMsg(''); busy = false; }, 2500);
        return;
      }

      employee     = data.employee;
      credentialId = data.credentialId;
      showStep('webauthn');
      startWebAuthn();

    } catch (e) {
      renderPinDots('error');
      setPinMsg('Sin conexión — verifica tu red');
      setTimeout(() => { pin = ''; renderPinDots(); setPinMsg(''); busy = false; }, 2000);
    }
  }

  // ─── WEBAUTHN ─────────────────────────────────────────────
  async function startWebAuthn() {
    const waAvatar = document.getElementById('waAvatar');
    const waName   = document.getElementById('waName');
    waAvatar.textContent = employee.name.charAt(0).toUpperCase();
    waName.textContent   = '¡Hola, ' + employee.name + '!';

    try {
      // Obtener challenge del servidor
      const res  = await fetch(`${GAS_URL}?action=challenge&employeeId=${employee.id}`);
      const data = await res.json();
      if (!data.success) throw new Error('No se pudo obtener challenge');

      const challengeBytes = b64ToBytes(data.challenge);
      const credBytes      = b64ToBytes(credentialId);

      // Solicitar autenticación WebAuthn en el dispositivo registrado
      const assertion = await navigator.credentials.get({
        publicKey: {
          challenge:          challengeBytes,
          allowCredentials:   [{ id: credBytes, type: 'public-key', transports: ['internal'] }],
          userVerification:   'required',
          timeout:            60000
        }
      });

      // Verificar que el credential usado es el registrado
      const usedId = bytesToB64(new Uint8Array(assertion.rawId));
      if (normalizeB64(usedId) !== normalizeB64(credentialId)) {
        throw new Error('device_mismatch');
      }

      // Todo OK → mostrar botones de acción
      showStep('action');

    } catch (e) {
      document.getElementById('waSpinner').style.display = 'none';
      const errEl = document.getElementById('waErr');
      errEl.classList.remove('hidden');

      if (e.name === 'NotAllowedError') {
        errEl.textContent = 'Autenticación cancelada. Vuelve a intentarlo.';
      } else if (e.message === 'device_mismatch') {
        errEl.textContent = '🚫 Este dispositivo no está autorizado para este empleado.';
      } else {
        errEl.textContent = '❌ Error de autenticación. Contacta al administrador.';
      }

      setTimeout(() => resetApp(), 3500);
    }
  }

  // ─── REGISTRAR ASISTENCIA ─────────────────────────────────
  document.getElementById('btnEntrada').addEventListener('click', () => doAttendance('entrada'));
  document.getElementById('btnSalida').addEventListener('click',  () => doAttendance('salida'));

  async function doAttendance(type) {
    setBtnsDisabled(true);
    setActMsg('loading', 'Registrando…');

    try {
      const url = `${GAS_URL}?action=attendance` +
        `&employeeId=${encodeURIComponent(employee.id)}` +
        `&type=${type}` +
        `&credentialId=${encodeURIComponent(credentialId)}` +
        `&lat=${userLat}` +
        `&lng=${userLng}`;

      const res  = await fetch(url);
      const data = await res.json();

      if (!data.success) {
        setActMsg('error', '❌ ' + data.error);
        setBtnsDisabled(false);
        return;
      }

      // Mostrar pantalla de éxito
      const isEntrada = type === 'entrada';
      const badge = document.getElementById('successBadge');
      badge.className = 'success-badge ' + type;
      document.getElementById('successIcon').textContent    = isEntrada ? '✓' : '✕';
      document.getElementById('successTitle').textContent   = isEntrada ? 'ENTRADA' : 'SALIDA';
      document.getElementById('successDetail').textContent  = employee.name;
      document.getElementById('successTimeBig').textContent = data.time;
      showStep('success');

    } catch (e) {
      setActMsg('error', '⚠️ Error de conexión — intenta de nuevo');
      setBtnsDisabled(false);
    }
  }

  function setBtnsDisabled(v) {
    document.getElementById('btnEntrada').disabled = v;
    document.getElementById('btnSalida').disabled  = v;
  }

  function setActMsg(cls, txt) {
    const el = document.getElementById('actMsg');
    el.className  = 'action-msg ' + cls;
    el.textContent = txt;
  }

  // ─── PASOS ────────────────────────────────────────────────
  function showStep(step) {
    document.getElementById('stepPin').style.display       = step === 'pin'      ? 'flex' : 'none';
    document.getElementById('stepWebAuthn').style.display  = step === 'webauthn' ? 'flex' : 'none';
    document.getElementById('stepAction').style.display    = step === 'action'   ? 'flex' : 'none';
    document.getElementById('stepSuccess').style.display   = step === 'success'  ? 'flex' : 'none';

    if (step === 'action') {
      document.getElementById('actAvatar').textContent = employee.name.charAt(0).toUpperCase();
      document.getElementById('actName').textContent   = employee.name;
    }
  }

  // ─── RESET ────────────────────────────────────────────────
  function resetApp() {
    pin          = '';
    employee     = null;
    credentialId = null;
    busy         = false;
    renderPinDots();
    setPinMsg('');
    setBtnsDisabled(false);
    setActMsg('', '');
    document.getElementById('waErr').classList.add('hidden');
    document.getElementById('waSpinner').style.display = '';
    showStep('pin');
    // Refrescar ubicación
    locationOK = false;
    setGeo('checking', 'Verificando ubicación…');
    initGeo();
  }

  // ─── UTILIDADES B64 ───────────────────────────────────────
  function b64ToBytes(b64) {
    const bin   = atob(b64.replace(/-/g, '+').replace(/_/g, '/'));
    const bytes = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
    return bytes;
  }

  function bytesToB64(bytes) {
    let bin = '';
    bytes.forEach(b => { bin += String.fromCharCode(b); });
    return btoa(bin);
  }

  function normalizeB64(s) {
    return s.replace(/-/g, '+').replace(/_/g, '/').replace(/=/g, '');
  }

  function haversine(lat1, lng1, lat2, lng2) {
    const R    = 6371000;
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLng = (lng2 - lng1) * Math.PI / 180;
    const a    = Math.sin(dLat/2) ** 2 +
      Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) * Math.sin(dLng/2) ** 2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  }

  // ─── INIT ─────────────────────────────────────────────────
  showStep('pin');
  initGeo();
  </script>
