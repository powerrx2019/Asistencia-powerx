<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Registro de Asistencia — POWERX</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #F0F4F8; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }

    .card { background: #fff; border-radius: 20px; padding: 1.75rem 1.5rem; max-width: 380px; width: 100%; box-shadow: 0 4px 24px rgba(0,0,0,0.09); }

    .header { text-align: center; margin-bottom: 1.25rem; }
    .logo { width: 52px; height: 52px; border-radius: 14px; background: #1D4ED8; display: flex; align-items: center; justify-content: center; margin: 0 auto 10px; }
    .logo svg { width: 28px; height: 28px; }
    h1 { font-size: 18px; font-weight: 600; color: #111827; }
    .date-text { font-size: 12px; color: #6B7280; margin-top: 3px; }
    .sat-badge { display: inline-block; margin-top: 5px; background: #FEF3C7; color: #92400E; font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 999px; }

    .clock { text-align: center; font-size: 36px; font-weight: 300; color: #111827; letter-spacing: 2px; margin-bottom: 1.25rem; }

    .label { font-size: 11px; font-weight: 600; color: #9CA3AF; text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 8px; }

    .names-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 1.5rem; }
    .name-btn { padding: 13px 4px; border-radius: 12px; border: 1.5px solid #E5E7EB; background: #fff; cursor: pointer; font-size: 13px; color: #374151; text-align: center; font-family: inherit; transition: all 0.15s; }
    .name-btn:active { transform: scale(0.96); }
    .name-btn.selected { background: #EFF6FF; border-color: #3B82F6; color: #1D4ED8; font-weight: 600; }
    .fp-dot { font-size: 10px; display: block; margin-top: 3px; color: #22C55E; }
    .fp-dot.none { color: #D1D5DB; }

    .fp-wrap { text-align: center; margin-bottom: 1rem; }
    .fp-btn { width: 86px; height: 86px; border-radius: 50%; border: 2.5px solid #3B82F6; background: #EFF6FF; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; margin-bottom: 8px; transition: all 0.15s; }
    .fp-btn:active { transform: scale(0.93); background: #DBEAFE; }
    .fp-btn:disabled { border-color: #D1D5DB; background: #F9FAFB; cursor: not-allowed; opacity: 0.5; }
    .fp-btn.verified { border-color: #16A34A; background: #F0FDF4; }
    .fp-btn svg { width: 42px; height: 42px; transition: all 0.2s; }
    .fp-hint { font-size: 13px; color: #6B7280; }

    .divider { display: flex; align-items: center; gap: 10px; margin: .75rem 0; }
    .div-line { flex: 1; height: 1px; background: #F3F4F6; }
    .div-text { font-size: 12px; color: #9CA3AF; }

    .pin-toggle { background: none; border: none; color: #6B7280; font-size: 13px; cursor: pointer; font-family: inherit; text-decoration: underline; display: block; margin: 0 auto; }
    .pin-area { display: none; margin-top: 10px; }
    .pin-area.show { display: block; }

    .pin-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; max-width: 220px; margin: 0 auto 8px; }
    .pin-key { padding: 14px 4px; border-radius: 10px; border: 1.5px solid #E5E7EB; background: #fff; font-size: 18px; font-weight: 500; color: #111827; cursor: pointer; text-align: center; font-family: inherit; transition: all 0.1s; }
    .pin-key:active { background: #EFF6FF; border-color: #3B82F6; transform: scale(0.95); }
    .pin-key.del { font-size: 16px; color: #6B7280; }
    .pin-display { text-align: center; font-size: 28px; letter-spacing: 12px; color: #111827; margin-bottom: 8px; min-height: 40px; }

    .action-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 1.25rem; }
    .btn { padding: 14px; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit; border: none; transition: all 0.15s; }
    .btn:active { transform: scale(0.97); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
    .btn-e { background: #16A34A; color: #fff; }
    .btn-s { background: #F3F4F6; color: #374151; border: 1.5px solid #E5E7EB; }

    .msg { padding: 12px 14px; border-radius: 10px; font-size: 14px; text-align: center; display: none; line-height: 1.5; margin-top: 1rem; }
    .msg.ok   { background: #F0FDF4; color: #15803D; border: 1px solid #BBF7D0; }
    .msg.err  { background: #FEF2F2; color: #B91C1C; border: 1px solid #FECACA; }
    .msg.info { background: #EFF6FF; color: #1D4ED8; border: 1px solid #BFDBFE; }

    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid currentColor; border-top-color: transparent; border-radius: 50%; animation: spin 0.6s linear infinite; vertical-align: middle; margin-right: 5px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="card">

  <div class="header">
    <div class="logo">
      <svg viewBox="0 0 28 28" fill="none">
        <circle cx="14" cy="9" r="4.5" stroke="white" stroke-width="2"/>
        <path d="M5 24c0-5 4-8.5 9-8.5s9 3.5 9 8.5" stroke="white" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </div>
    <h1>Registro de Asistencia</h1>
    <p class="date-text" id="date-text"></p>
    <div id="sat-badge" class="sat-badge" style="display:none">Sábado · Turno 9:00–14:00</div>
  </div>

  <div class="clock" id="clock">--:--</div>

  <div id="form-area">
    <div class="label">¿Quién eres?</div>
    <div class="names-grid" id="names-grid">
      <div style="grid-column:1/-1;text-align:center;color:#9CA3AF;font-size:13px;padding:1rem">Cargando...</div>
    </div>

    <div class="fp-wrap">
      <button class="fp-btn" id="fp-btn" disabled onclick="doFingerprint()">
        <svg viewBox="0 0 42 42" fill="none" id="fp-icon">
          <path d="M21 5C11.6 5 4 12.6 4 22" stroke="#3B82F6" stroke-width="2.2" stroke-linecap="round"/>
          <path d="M38 22c0 8.8-7.2 16-16 16" stroke="#3B82F6" stroke-width="2.2" stroke-linecap="round"/>
          <path d="M13 22a8 8 0 0 1 8-8" stroke="#3B82F6" stroke-width="2.2" stroke-linecap="round"/>
          <path d="M29 22a8 8 0 0 1-8 8" stroke="#3B82F6" stroke-width="2.2" stroke-linecap="round"/>
          <circle cx="21" cy="22" r="3" fill="#3B82F6"/>
        </svg>
      </button>
      <p class="fp-hint" id="fp-hint">Selecciona tu nombre primero</p>
    </div>

    <div class="divider"><div class="div-line"></div><span class="div-text">o usa tu PIN</span><div class="div-line"></div></div>

    <div style="text-align:center">
      <button class="pin-toggle" onclick="togglePin()" id="pin-toggle">Mostrar teclado PIN</button>
    </div>

    <div class="pin-area" id="pin-area">
      <div class="pin-display" id="pin-display">····</div>
      <div class="pin-grid" id="pin-grid"></div>
    </div>

    <div class="action-row">
      <button class="btn btn-e" id="btn-e" disabled onclick="submit('entrada')">Entrada</button>
      <button class="btn btn-s" id="btn-s" disabled onclick="submit('salida')">Salida</button>
    </div>

    <div class="msg" id="msg"></div>
  </div>
</div>

<script>
  // ── CONFIGURACIÓN ──────────────────────────────────────────
  // Pega aquí la URL COMPLETA de tu Google Apps Script publicado
  // Ejemplo: https://script.google.com/macros/s/AKfycbxABC123xyz.../exec
  const API_URL = 'https://script.google.com/macros/s/AKfycbz8O5y73x3b9o80gPo0Dd9bxp9GdLN2aGXZJ8H1XBeMaShRMOTWrJv4Lt_VqEv0GMs4YA/exec';
  // ──────────────────────────────────────────────────────────

  let selName = null, selCred = null;
  let verifiedMethod = null, verifiedPin = null;
  let authChallenge = null, authCredId = null;
  let pinVisible = false, pinVal = '';
  let employees = [];

  // Fecha y reloj
  const today = new Date();
  document.getElementById('date-text').textContent = today.toLocaleDateString('es-MX',
    { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

  function updateClock() {
    document.getElementById('clock').textContent =
      new Date().toLocaleTimeString('es-MX', { hour: '2-digit', minute: '2-digit' });
  }
  updateClock(); setInterval(updateClock, 1000);

  // Teclado PIN
  const pinKeys = [1,2,3,4,5,6,7,8,9,'',0,'⌫'];
  const pinGrid = document.getElementById('pin-grid');
  pinKeys.forEach(function(k) {
    const btn = document.createElement('button');
    btn.className = 'pin-key' + (k === '⌫' ? ' del' : '');
    btn.textContent = k === '' ? '' : k;
    btn.disabled = k === '';
    btn.style.visibility = k === '' ? 'hidden' : 'visible';
    btn.onclick = function() {
      if (k === '⌫') { pinVal = pinVal.slice(0,-1); }
      else if (typeof k === 'number' && pinVal.length < 4) { pinVal += k; }
      updatePinDisplay();
      if (pinVal.length === 4) { verifiedMethod = 'pin'; verifiedPin = pinVal; enableActions(); showMsg('info','PIN listo. Presiona Entrada o Salida.'); }
      else { verifiedMethod = null; verifiedPin = null; disableActions(); }
    };
    pinGrid.appendChild(btn);
  });

  function updatePinDisplay() {
    const filled = '●'.repeat(pinVal.length) + '·'.repeat(4 - pinVal.length);
    document.getElementById('pin-display').textContent = filled;
  }

  // Cargar empleados desde API
  fetch(API_URL + '?action=employees')
    .then(function(r){ return r.json(); })
    .then(function(emps) {
      employees = emps;
      const grid = document.getElementById('names-grid');
      grid.innerHTML = '';
      if (emps.length && emps[0].isSaturday) {
        document.getElementById('sat-badge').style.display = 'inline-block';
      }
      emps.forEach(function(emp) {
        const btn = document.createElement('button');
        btn.className = 'name-btn';
        const dot = emp.hasFingerprint
          ? '<span class="fp-dot">● huella</span>'
          : '<span class="fp-dot none">○ solo PIN</span>';
        btn.innerHTML = emp.name + dot;
        btn.onclick = function() {
          document.querySelectorAll('.name-btn').forEach(b => b.classList.remove('selected'));
          btn.classList.add('selected');
          selName = emp.name; selCred = emp.credentialId;
          verifiedMethod = null; verifiedPin = null; pinVal = '';
          updatePinDisplay(); disableActions();
          updateFpBtn();
        };
        grid.appendChild(btn);
      });
    })
    .catch(function() {
      document.getElementById('names-grid').innerHTML =
        '<div style="grid-column:1/-1;text-align:center;color:#B91C1C;font-size:13px;padding:1rem">Error de conexión. Recarga la página.</div>';
    });

  function updateFpBtn() {
    const btn  = document.getElementById('fp-btn');
    const hint = document.getElementById('fp-hint');
    if (!selName)  { btn.disabled = true; hint.textContent = 'Selecciona tu nombre primero'; return; }
    if (!selCred)  { btn.disabled = true; hint.textContent = selName + ' · usa tu PIN abajo'; return; }
    btn.disabled = false;
    btn.className = 'fp-btn';
    hint.textContent = 'Toca para verificar tu huella';
  }

  function togglePin() {
    pinVisible = !pinVisible;
    document.getElementById('pin-area').className = 'pin-area' + (pinVisible ? ' show' : '');
    document.getElementById('pin-toggle').textContent = pinVisible ? 'Ocultar teclado PIN' : 'Mostrar teclado PIN';
  }

  // WebAuthn — funciona desde GitHub Pages y cualquier sitio HTTPS
  function doFingerprint() {
    if (!selCred) return;
    const fpBtn = document.getElementById('fp-btn');
    fpBtn.disabled = true;
    showMsg('info', '<span class="spinner"></span>Esperando huella...');

    fetch(API_URL + '?action=challenge')
      .then(function(r){ return r.json(); })
      .then(function(data) {
        const challenge    = data.challenge;
        const challengeBuf = new TextEncoder().encode(challenge);
        const credIdBuf    = _b64ToBuffer(selCred);

        return navigator.credentials.get({
          publicKey: {
            challenge        : challengeBuf,
            allowCredentials : [{ type: 'public-key', id: credIdBuf }],
            userVerification : 'required',
            timeout          : 60000
          }
        }).then(function(assertion) {
          authChallenge    = challenge;
          authCredId       = btoa(String.fromCharCode(...new Uint8Array(assertion.rawId)));
          verifiedMethod   = 'fingerprint';
          verifiedPin      = null;
          fpBtn.disabled   = false;
          fpBtn.className  = 'fp-btn verified';
          document.getElementById('fp-hint').textContent = '✓ Huella verificada';
          enableActions();
          showMsg('ok', '✓ Identidad verificada. Presiona Entrada o Salida.');
        });
      })
      .catch(function(err) {
        fpBtn.disabled  = false;
        const msg = (err.name === 'NotAllowedError')
          ? 'Huella no reconocida o cancelada. Intenta de nuevo o usa tu PIN.'
          : 'Error: ' + err.message;
        showMsg('err', msg);
      });
  }

  function submit(type) {
    if (!selName || !verifiedMethod) return;
    disableActions();
    showMsg('info', '<span class="spinner"></span>Registrando ' + type + '...');

    const payload = { name: selName, type: type, method: verifiedMethod };
    if (verifiedMethod === 'fingerprint') {
      payload.credentialId = authCredId;
      payload.challenge    = authChallenge;
    } else {
      payload.pin = verifiedPin;
    }

    fetch(API_URL + '?action=attendance', {
      method : 'POST',
      headers: { 'Content-Type': 'application/json' },
      body   : JSON.stringify(payload)
    })
    .then(function(r){ return r.json(); })
    .then(function(res) {
      showMsg(res.ok ? 'ok' : 'err', res.msg);
      if (res.ok) {
        setTimeout(function() {
          document.querySelectorAll('.name-btn').forEach(b => b.classList.remove('selected'));
          selName = null; selCred = null; verifiedMethod = null; verifiedPin = null;
          pinVal = ''; updatePinDisplay();
          authChallenge = null; authCredId = null;
          document.getElementById('fp-btn').className = 'fp-btn';
          document.getElementById('fp-btn').disabled = true;
          document.getElementById('fp-hint').textContent = 'Selecciona tu nombre primero';
          document.getElementById('pin-area').className = 'pin-area';
          document.getElementById('pin-toggle').textContent = 'Mostrar teclado PIN';
          pinVisible = false;
          disableActions();
          document.getElementById('msg').style.display = 'none';
        }, 3500);
      } else { enableActions(); }
    })
    .catch(function() {
      showMsg('err', 'Error de conexión. Intenta de nuevo.');
      enableActions();
    });
  }

  function enableActions()  { document.getElementById('btn-e').disabled = false; document.getElementById('btn-s').disabled = false; }
  function disableActions() { document.getElementById('btn-e').disabled = true;  document.getElementById('btn-s').disabled = true;  }
  function showMsg(type, html) {
    const el = document.getElementById('msg');
    el.innerHTML = html; el.className = 'msg ' + type; el.style.display = 'block';
  }
  function _b64ToBuffer(b64) {
    const bin = atob(b64.replace(/-/g,'+').replace(/_/g,'/'));
    const buf = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) buf[i] = bin.charCodeAt(i);
    return buf.buffer;
  }
</script>
</body>
</html>
